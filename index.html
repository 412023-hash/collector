<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍藏大師收藏系統 - COLL-MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #020617;
            color: #cbd5e1;
            overflow-x: hidden;
        }

        .glass-sidebar {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(24px);
            border-right: 1px solid rgba(30, 41, 59, 1);
        }

        .bg-grid {
            background-image: radial-gradient(#3b82f6 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
        }

        .active-nav-item {
            background: linear-gradient(to right, rgba(37, 99, 235, 0.2), rgba(147, 51, 234, 0.1));
            color: white;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
        }

        .active-nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
        }

        .card-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-hover:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex">
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>

    <!-- 側邊欄導航 -->
    <aside class="w-80 glass-sidebar flex flex-col fixed h-full z-40">
        <div class="p-10 flex items-center space-x-4 cursor-pointer" onclick="switchTab('DASHBOARD')">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                <i class="fas fa-layer-group fa-lg"></i>
            </div>
            <div><span class="text-2xl font-black text-white tracking-tighter">COLL-MASTER</span></div>
        </div>

        <nav class="flex-1 px-6 space-y-3">
            <button onclick="switchTab('DASHBOARD')" id="nav-DASHBOARD" class="nav-btn w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 relative overflow-hidden group active-nav-item">
                <i class="fas fa-th-large w-5"></i>
                <span class="font-bold text-sm tracking-[0.2em]">操作面板</span>
            </button>
            <button onclick="switchTab('COLLECTIONS')" id="nav-COLLECTIONS" class="nav-btn w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 relative overflow-hidden group text-slate-500 hover:text-slate-200">
                <i class="fas fa-database w-5"></i>
                <span class="font-bold text-sm tracking-[0.2em]">資產檔案庫</span>
            </button>
            <button onclick="switchTab('ANALYTICS')" id="nav-ANALYTICS" class="nav-btn w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 relative overflow-hidden group text-slate-500 hover:text-slate-200">
                <i class="fas fa-chart-line w-5"></i>
                <span class="font-bold text-sm tracking-[0.2em]">價值趨勢</span>
            </button>
        </nav>

        <!-- 用戶資訊與 Google 登入 -->
        <div id="user-section" class="p-8 hidden border-t border-slate-800/50">
            <div id="google-btn-container" class="mb-6 flex justify-center"></div>
            <div id="user-info" class="flex items-center space-x-3 mb-6 px-4">
                <img id="user-avatar" class="w-10 h-10 rounded-full border border-blue-500/50 hidden">
                <div class="overflow-hidden">
                    <p id="user-name" class="text-white font-bold text-sm truncate">訪客模式</p>
                    <p id="user-id-display" class="text-[9px] text-slate-500 truncate font-mono uppercase"></p>
                </div>
            </div>
            <button onclick="handleLogout()" class="w-full flex items-center space-x-4 text-slate-500 hover:text-red-400 transition-colors px-6 py-4 rounded-xl hover:bg-red-400/5">
                <i class="fas fa-sign-out-alt"></i>
                <span class="font-bold text-xs uppercase tracking-widest">登出系統</span>
            </button>
        </div>
    </aside>

    <!-- 主要內容區 -->
    <main class="flex-1 ml-80 p-16 relative z-10">
        <div id="loading-view" class="flex flex-col items-center justify-center py-40 space-y-6">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-blue-500 rounded-full animate-spin"></div>
            </div>
            <p class="text-slate-400 font-black tracking-widest uppercase animate-pulse">系統核心驗證中...</p>
        </div>

        <div id="main-content" class="hidden space-y-12">
            <!-- 動態內容插入點 -->
        </div>
    </main>

    <!-- 彈窗 Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="relative w-full max-w-xl bg-slate-900 rounded-[48px] border border-slate-800 p-12 space-y-8 shadow-2xl">
            <div class="flex justify-between items-center">
                <h2 id="modal-title" class="text-2xl font-black text-white italic tracking-tighter">INITIALIZE ASSET</h2>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-slate-400 hover:text-white transition-all">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">基本資訊 (NAME)</label>
                    <input id="form-name" type="text" placeholder="請輸入名稱..." class="w-full px-8 py-5 bg-slate-950 border border-slate-800 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
                </div>
                
                <div id="item-fields" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">市場估值 (TWD)</label>
                        <input id="form-price" type="number" placeholder="0" class="w-full px-8 py-5 bg-slate-950 border border-slate-800 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">視覺存證 (IMAGE)</label>
                    <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-slate-800 rounded-3xl h-56 flex items-center justify-center cursor-pointer overflow-hidden hover:border-blue-500 transition-all bg-slate-950 group relative">
                        <div id="preview-container" class="w-full h-full flex items-center justify-center">
                            <div class="text-center">
                                <i class="fas fa-cloud-upload-alt text-slate-700 group-hover:text-blue-500 text-4xl mb-4 transition-colors"></i>
                                <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">點擊或拖放圖片</p>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(event)">
                </div>
            </div>

            <button id="save-btn" onclick="handleSave()" class="w-full py-6 bg-blue-600 text-white font-black rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center space-x-3">
                <i class="fas fa-check-circle"></i>
                <span id="btn-text">確認存檔同步</span>
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, signOut, GoogleAuthProvider, signInWithCredential } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCkz6O29c02IuYQQEafM6669VzG23kX4Oc",
            authDomain: "colletor-4c326.firebaseapp.com",
            projectId: "colletor-4c326",
            storageBucket: "colletor-4c326.firebasestorage.app",
            messagingSenderId: "1036271994554",
            appId: "1:1036271994554:web:08f125822a27aeaa78a483"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'collection-master';

        // 全域狀態
        let currentUser = null;
        let activeTab = 'DASHBOARD';
        let collectionsData = [];
        let itemsData = [];
        let selectedCollectionId = null;
        let currentModalType = 'ITEM';
        let previewImage = null;

        // 1. 初始化驗證 (RULE 3)
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (e) {
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Fail", err);
            }
        }

        // 監聽 Auth 狀態
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('user-id-display').innerText = `UID: ${user.uid}`;
                
                if (user.displayName) {
                    document.getElementById('user-name').innerText = user.displayName;
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = user.photoURL;
                    avatar.classList.remove('hidden');
                }

                if (user.isAnonymous) {
                    initGoogleSignIn();
                } else {
                    document.getElementById('google-btn-container').innerHTML = '';
                }
                
                setupListeners();
            }
        });

        function initGoogleSignIn() {
            if (document.getElementById('gsi-script')) return;
            const script = document.createElement('script');
            script.id = 'gsi-script';
            script.src = 'https://accounts.google.com/gsi/client';
            script.async = true;
            document.head.appendChild(script);
            script.onload = () => {
                window.google.accounts.id.initialize({
                    client_id: "1036271994554-pk9u8tjr3o2c8h7l2f1v89k7o3f8p6u3.apps.googleusercontent.com",
                    callback: async (response) => {
                        const credential = GoogleAuthProvider.credential(response.credential);
                        await signInWithCredential(auth, credential);
                    },
                });
                window.google.accounts.id.renderButton(
                    document.getElementById('google-btn-container'),
                    { theme: "filled_black", size: "large", shape: "pill" }
                );
            };
        }

        // 2. 監聽 Firestore (RULE 1 & 2)
        function setupListeners() {
            if (!currentUser) return;

            // 分類列表 (Public)
            const catRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
            onSnapshot(catRef, (snap) => {
                collectionsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Snapshot Error", err));

            // 物件列表 (Private)
            const itemRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
            onSnapshot(itemRef, (snap) => {
                itemsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Snapshot Error", err));

            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }

        // --- 功能模組 ---
        window.switchTab = (tab) => {
            activeTab = tab;
            if (tab !== 'DETAIL') selectedCollectionId = null;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active-nav-item', 'text-white');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`nav-${tab}`);
            if (activeBtn) activeBtn.classList.add('active-nav-item');
            render();
        };

        window.openModal = (type, colId = null) => {
            currentModalType = type;
            selectedCollectionId = colId || selectedCollectionId;
            document.getElementById('modal-title').innerText = type === 'ITEM' ? 'INITIALIZE ASSET' : 'CREATE CATEGORY';
            document.getElementById('item-fields').classList.toggle('hidden', type === 'CATEGORY');
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('form-name').value = '';
            document.getElementById('form-price').value = '';
            document.getElementById('preview-container').innerHTML = `
                <div class="text-center">
                    <i class="fas fa-cloud-upload-alt text-slate-700 group-hover:text-blue-500 text-4xl mb-4 transition-colors"></i>
                    <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">點擊或拖放圖片</p>
                </div>`;
            previewImage = null;
        };

        window.handleFile = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImage = event.target.result;
                    document.getElementById('preview-container').innerHTML = `<img src="${previewImage}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        };

        window.handleSave = async () => {
            const name = document.getElementById('form-name').value.trim();
            const price = document.getElementById('form-price').value;
            if (!name) return;

            const btn = document.getElementById('save-btn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerText = 'SYNCING...';

            try {
                if (currentModalType === 'ITEM') {
                    const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
                    await addDoc(ref, {
                        name,
                        price: Number(price) || 0,
                        collectionId: selectedCollectionId || 'default',
                        img: previewImage || '',
                        createdAt: serverTimestamp()
                    });
                } else {
                    const ref = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
                    const colors = ['from-blue-600 to-indigo-700', 'from-purple-600 to-pink-700', 'from-emerald-600 to-teal-700', 'from-orange-600 to-red-700'];
                    await addDoc(ref, {
                        title: name,
                        category: 'GENERAL',
                        icon: '📦',
                        color: colors[Math.floor(Math.random() * colors.length)],
                        createdAt: serverTimestamp()
                    });
                }
                closeModal();
            } catch (e) {
                console.error("Save failed", e);
            } finally {
                btn.disabled = false;
                btnText.innerText = '確認存檔同步';
            }
        };

        window.deleteEntry = async (e, id, type) => {
            e.stopPropagation();
            if (!confirm('此操作無法還原，確定要刪除？')) return;
            const path = type === 'ITEM' 
                ? ['artifacts', appId, 'users', currentUser.uid, 'items', id]
                : ['artifacts', appId, 'public', 'data', 'categories', id];
            await deleteDoc(doc(db, ...path));
        };

        window.openDetail = (id) => {
            selectedCollectionId = id;
            activeTab = 'DETAIL';
            render();
        };

        window.handleLogout = () => signOut(auth).then(() => window.location.reload());

        // --- 渲染函數 ---
        function render() {
            const container = document.getElementById('main-content');
            
            if (activeTab === 'DASHBOARD') {
                container.innerHTML = `
                    <div class="bg-slate-900 rounded-[64px] border border-slate-800 p-16 relative overflow-hidden shadow-2xl animate-fade-in">
                        <div class="relative z-10">
                            <h1 class="text-6xl font-black text-white mb-6 italic tracking-tighter uppercase leading-none">
                                ${currentUser?.displayName ? `WELCOME, ${currentUser.displayName}` : 'COLLECTION MANAGER'}
                            </h1>
                            <p class="text-slate-400 text-xl opacity-80 max-w-2xl leading-relaxed">
                                您目前的數位資產總額已由雲端加密保護。系統運作狀態：<span class="text-emerald-500 font-bold">同步中</span>
                            </p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                        ${collectionsData.map(col => `
                            <div onclick="openDetail('${col.id}')" class="bg-slate-900/40 rounded-[48px] border border-slate-800 p-10 card-hover cursor-pointer group">
                                <div class="w-16 h-16 rounded-[24px] bg-gradient-to-br ${col.color} flex items-center justify-center text-3xl mb-8 shadow-xl">
                                    ${col.icon}
                                </div>
                                <h3 class="font-black text-white text-xl uppercase group-hover:text-blue-400 transition-colors">${col.title}</h3>
                                <div class="flex justify-between items-center mt-4">
                                    <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">${itemsData.filter(i => i.collectionId === col.id).length} ITEMS</p>
                                    <i class="fas fa-chevron-right text-slate-800 group-hover:text-blue-500 transition-colors"></i>
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="openModal('CATEGORY')" class="bg-slate-900/20 border-2 border-dashed border-slate-800 rounded-[48px] flex flex-col items-center justify-center text-slate-600 hover:border-blue-500/50 hover:bg-blue-500/5 transition-all p-12 min-h-[220px] group">
                            <i class="fas fa-plus text-2xl group-hover:rotate-90 transition-transform duration-500"></i>
                            <span class="mt-4 text-[10px] font-black uppercase tracking-widest">建立新檔案分類</span>
                        </button>
                    </div>
                `;
            } else if (activeTab === 'DETAIL') {
                const col = collectionsData.find(c => c.id === selectedCollectionId);
                const filtered = itemsData.filter(i => i.collectionId === selectedCollectionId);
                container.innerHTML = `
                    <div class="flex items-center justify-between animate-fade-in">
                        <div class="flex items-center space-x-6">
                            <button onclick="switchTab('DASHBOARD')" class="w-14 h-14 flex items-center justify-center bg-slate-800/50 border border-slate-700 rounded-2xl text-slate-400 hover:text-white hover:bg-slate-700 transition-all">
                                <i class="fas fa-arrow-left"></i>
                            </button>
                            <div>
                                <h1 class="text-4xl font-black text-white tracking-tighter uppercase">${col ? col.title : '未知分類'}</h1>
                                <p class="text-xs text-slate-500 font-bold tracking-widest uppercase mt-1">
                                    <i class="fas fa-database mr-2"></i>DATABASE RECORD: ${filtered.length}
                                </p>
                            </div>
                        </div>
                        <button onclick="openModal('ITEM')" class="bg-blue-600 text-white px-10 py-5 rounded-3xl shadow-lg shadow-blue-600/20 font-black text-sm hover:scale-105 active:scale-95 transition-all flex items-center space-x-3">
                            <i class="fas fa-plus"></i><span>ADD NEW ASSET</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                        ${filtered.map(item => `
                            <div class="bg-slate-900/40 border border-slate-800 rounded-[40px] overflow-hidden card-hover group">
                                <div class="h-72 overflow-hidden relative bg-slate-950 flex items-center justify-center">
                                    ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<i class="fas fa-box-open text-slate-900 text-6xl"></i>`}
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-60"></div>
                                </div>
                                <div class="p-10">
                                    <h4 class="font-black text-white text-xl mb-4 truncate">${item.name}</h4>
                                    <div class="flex justify-between items-center">
                                        <p class="text-blue-400 font-black text-2xl tracking-tighter">NT$ ${item.price.toLocaleString()}</p>
                                        <button onclick="deleteEntry(event, '${item.id}', 'ITEM')" class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-700 hover:text-red-500 hover:bg-red-500/10 transition-all">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        ${filtered.length === 0 ? `<div class="col-span-full py-20 text-center text-slate-700 font-black uppercase tracking-widest italic">目前此分類下無任何資產記錄</div>` : ''}
                    </div>
                `;
            } else if (activeTab === 'COLLECTIONS') {
                container.innerHTML = `
                    <div class="flex justify-between items-end animate-fade-in">
                        <h1 class="text-5xl font-black text-white tracking-tighter italic uppercase">ARCHIVE INDEX</h1>
                        <button onclick="openModal('CATEGORY')" class="bg-white text-black px-10 py-5 rounded-3xl font-black flex items-center space-x-3 hover:bg-blue-500 hover:text-white transition-all">
                            <i class="fas fa-plus"></i><span>NEW CATEGORY</span>
                        </button>
                    </div>
                    <div class="bg-slate-900/40 rounded-[48px] border border-slate-800 overflow-hidden shadow-2xl animate-fade-in">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800">
                                <tr>
                                    <th class="px-12 py-10 text-center w-24">ICON</th>
                                    <th class="px-12 py-10">CATEGORY NAME</th>
                                    <th class="px-12 py-10">STATUS</th>
                                    <th class="px-12 py-10 text-right">ACTION</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-800/50 text-white">
                                ${collectionsData.map(col => `
                                    <tr class="hover:bg-blue-500/5 transition-colors group">
                                        <td class="px-12 py-10 text-center text-3xl">${col.icon}</td>
                                        <td class="px-12 py-10 font-black text-xl">${col.title}</td>
                                        <td class="px-12 py-10">
                                            <span class="bg-slate-800 text-slate-400 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest group-hover:bg-blue-600 group-hover:text-white transition-colors">ACTIVE</span>
                                        </td>
                                        <td class="px-12 py-10 text-right">
                                            <button onclick="deleteEntry(event, '${col.id}', 'CAT')" class="text-slate-700 hover:text-red-500 transition-colors p-4">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else if (activeTab === 'ANALYTICS') {
                const totalValue = itemsData.reduce((sum, i) => sum + (i.price || 0), 0);
                container.innerHTML = `
                    <h1 class="text-5xl font-black text-white tracking-tighter italic uppercase animate-fade-in">VALUATION REPORT</h1>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 animate-fade-in">
                        <div class="bg-blue-600 rounded-[64px] p-16 text-white shadow-2xl shadow-blue-600/20 relative overflow-hidden">
                            <i class="fas fa-vault absolute -right-10 -bottom-10 text-[200px] opacity-10 rotate-12"></i>
                            <p class="text-xs font-black uppercase tracking-widest opacity-80 mb-6">ESTIMATED TOTAL VALUE</p>
                            <h2 class="text-7xl font-black italic tracking-tighter">NT$ ${totalValue.toLocaleString()}</h2>
                        </div>
                        <div class="bg-slate-900 rounded-[64px] border border-slate-800 p-16 text-white relative overflow-hidden">
                            <p class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">INVENTORY COUNT</p>
                            <h2 class="text-7xl font-black italic tracking-tighter">${itemsData.length} <span class="text-2xl not-italic text-slate-600">UNITS</span></h2>
                        </div>
                    </div>
                    <div class="bg-slate-900/40 border border-slate-800 rounded-[48px] p-12">
                        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-10 text-center">價值分佈概覽</p>
                        <div class="space-y-6">
                            ${collectionsData.map(col => {
                                const colItems = itemsData.filter(i => i.collectionId === col.id);
                                const colValue = colItems.reduce((s, i) => s + (i.price || 0), 0);
                                const percent = totalValue > 0 ? (colValue / totalValue) * 100 : 0;
                                return `
                                    <div class="space-y-3">
                                        <div class="flex justify-between text-sm font-black uppercase">
                                            <span class="text-white">${col.title}</span>
                                            <span class="text-slate-500">NT$ ${colValue.toLocaleString()} (${percent.toFixed(1)}%)</span>
                                        </div>
                                        <div class="h-3 bg-slate-950 rounded-full overflow-hidden">
                                            <div class="h-full bg-blue-500 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
        }

        // 啟動
        window.onload = initAuth;
    </script>
</body>
</html>
