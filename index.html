<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍藏大師收藏系統 - COLL-MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #020617;
            color: #cbd5e1;
            overflow-x: hidden;
        }

        .glass-sidebar {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(24px);
            border-right: 1px solid rgba(30, 41, 59, 1);
        }

        .bg-grid {
            background-image: radial-gradient(#3b82f6 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
        }

        .active-nav-item {
            background: linear-gradient(to right, rgba(37, 99, 235, 0.2), rgba(147, 51, 234, 0.1));
            color: white;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
        }

        .active-nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex">
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>

    <!-- 側邊欄 -->
    <aside class="w-80 glass-sidebar flex flex-col fixed h-full z-40">
        <div class="p-10 flex items-center space-x-4 cursor-pointer" onclick="switchTab('DASHBOARD')">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                <i class="fas fa-layer-group fa-lg"></i>
            </div>
            <div><span class="text-2xl font-black text-white tracking-tighter">COLL-MASTER</span></div>
        </div>

        <nav class="flex-1 px-6 space-y-3">
            <button onclick="switchTab('DASHBOARD')" id="nav-DASHBOARD" class="nav-btn w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 relative overflow-hidden group active-nav-item">
                <i class="fas fa-th-large w-5"></i>
                <span class="font-bold text-sm tracking-[0.2em]">操作面板</span>
            </button>
            <button onclick="switchTab('COLLECTIONS')" id="nav-COLLECTIONS" class="nav-btn w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 relative overflow-hidden group text-slate-500 hover:text-slate-200">
                <i class="fas fa-database w-5"></i>
                <span class="font-bold text-sm tracking-[0.2em]">資產檔案庫</span>
            </button>
            <button onclick="switchTab('ANALYTICS')" id="nav-ANALYTICS" class="nav-btn w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 relative overflow-hidden group text-slate-500 hover:text-slate-200">
                <i class="fas fa-chart-line w-5"></i>
                <span class="font-bold text-sm tracking-[0.2em]">價值趨勢</span>
            </button>
        </nav>

        <div id="user-section" class="p-8 hidden">
            <div id="google-btn-container" class="mb-4"></div>
            <button onclick="handleLogout()" class="w-full flex items-center space-x-4 text-slate-500 hover:text-red-400 transition-colors px-6 py-4">
                <i class="fas fa-sign-out-alt"></i>
                <span class="font-bold text-xs uppercase tracking-widest">登出系統</span>
            </button>
        </div>
    </aside>

    <!-- 主要內容區 -->
    <main class="flex-1 ml-80 p-16 relative z-10">
        <div id="loading-view" class="flex flex-col items-center justify-center py-40 space-y-6">
            <i class="fas fa-spinner fa-spin fa-3x text-blue-500"></i>
            <p class="text-slate-400 font-black tracking-widest uppercase">系統核心驗證中...</p>
        </div>

        <div id="main-content" class="hidden space-y-12">
            <!-- 動態渲染區域 -->
        </div>
    </main>

    <!-- 彈窗 Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="relative w-full max-w-xl bg-slate-900 rounded-[48px] border border-slate-800 p-12 space-y-8 shadow-2xl animate-in zoom-in-95">
            <div class="flex justify-between items-center">
                <h2 id="modal-title" class="text-2xl font-black text-white italic">初始化資產</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white transition-colors">
                    <i class="fas fa-times fa-lg"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">基本資訊</label>
                    <input id="form-name" type="text" placeholder="名稱..." class="w-full px-8 py-5 bg-slate-950 border border-slate-800 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
                </div>
                
                <div id="item-fields" class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">市場估值 (TWD)</label>
                    <input id="form-price" type="number" placeholder="金額..." class="w-full px-8 py-5 bg-slate-950 border border-slate-800 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4">視覺存證 (IMAGE)</label>
                    <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-slate-800 rounded-3xl h-48 flex items-center justify-center cursor-pointer overflow-hidden hover:border-blue-500 transition-all bg-slate-950 group">
                        <div id="preview-container" class="w-full h-full flex items-center justify-center">
                            <i class="fas fa-cloud-upload-alt text-slate-700 group-hover:text-blue-500 text-3xl transition-colors"></i>
                        </div>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(event)">
                </div>
            </div>

            <button id="save-btn" onclick="handleSave()" class="w-full py-6 bg-blue-600 text-white font-black rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center space-x-3">
                <span id="btn-text">確認存檔</span>
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, signOut, GoogleAuthProvider, signInWithCredential } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCkz6O29c02IuYQQEafM6669VzG23kX4Oc",
            authDomain: "colletor-4c326.firebaseapp.com",
            projectId: "colletor-4c326",
            storageBucket: "colletor-4c326.firebasestorage.app",
            messagingSenderId: "1036271994554",
            appId: "1:1036271994554:web:08f125822a27aeaa78a483"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'collection-master';

        // 全域變數
        let currentUser = null;
        let activeTab = 'DASHBOARD';
        let collections = [];
        let items = [];
        let selectedCollectionId = null;
        let currentModalType = 'ITEM';
        let previewImage = null;

        // 1. 初始化驗證 (RULE 3 - 處理 Token Mismatch)
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (e) {
                        console.warn("Custom Token 失效，轉向匿名登入");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Init Error", err);
            }
        }

        // 監聽 Auth 狀態與 Google 登入按鈕初始化
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-section').classList.remove('hidden');
                setupListeners();
                
                // 如果是匿名用戶且尚未渲染 Google 按鈕，則載入 Google GIS
                if (user.isAnonymous) {
                    initGoogleSignIn();
                }
            }
        });

        // 初始化 Google 登入
        function initGoogleSignIn() {
            const script = document.createElement('script');
            script.src = 'https://accounts.google.com/gsi/client';
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
            script.onload = () => {
                if (window.google) {
                    window.google.accounts.id.initialize({
                        client_id: "1036271994554-pk9u8tjr3o2c8h7l2f1v89k7o3f8p6u3.apps.googleusercontent.com",
                        callback: async (response) => {
                            const credential = GoogleAuthProvider.credential(response.credential);
                            try {
                                await signInWithCredential(auth, credential);
                            } catch (e) {
                                console.error("Google 登入失敗", e);
                            }
                        },
                    });
                    const container = document.getElementById('google-btn-container');
                    if (container) {
                        window.google.accounts.id.renderButton(container, { theme: "filled_black", size: "large", width: 220, shape: "pill" });
                    }
                }
            };
        }

        // 2. 監聽 Firestore 數據 (RULE 1 & 2)
        function setupListeners() {
            if (!currentUser) return;

            // 公共分類監聽
            const catRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
            onSnapshot(catRef, (snap) => {
                collections = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("分類監聽失敗", err));

            // 個人物件監聽
            const itemRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
            onSnapshot(itemRef, (snap) => {
                items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("物件監聽失敗", err));

            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }

        // --- 功能函數供 HTML 調用 ---

        window.switchTab = (tab) => {
            activeTab = tab;
            if (tab !== 'DETAIL') selectedCollectionId = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active-nav-item', 'text-white');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`nav-${tab}`);
            if (activeBtn) {
                activeBtn.classList.add('active-nav-item');
                activeBtn.classList.remove('text-slate-500');
            }
            render();
        };

        window.openModal = (type, colId = null) => {
            currentModalType = type;
            selectedCollectionId = colId || selectedCollectionId;
            document.getElementById('modal-title').innerText = type === 'ITEM' ? '初始化新資產' : '建立新分類';
            document.getElementById('item-fields').style.display = type === 'ITEM' ? 'block' : 'none';
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('form-name').value = '';
            document.getElementById('form-price').value = '';
            document.getElementById('preview-container').innerHTML = '<i class="fas fa-cloud-upload-alt text-slate-700 group-hover:text-blue-500 text-3xl transition-colors"></i>';
            previewImage = null;
        };

        window.handleFile = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImage = event.target.result;
                    document.getElementById('preview-container').innerHTML = `<img src="${previewImage}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        };

        window.handleSave = async () => {
            const name = document.getElementById('form-name').value;
            const price = document.getElementById('form-price').value;
            if (!name || !currentUser) return;

            const btn = document.getElementById('save-btn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerText = '同步中...';

            try {
                if (currentModalType === 'ITEM') {
                    const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
                    await addDoc(ref, {
                        name,
                        price: Number(price) || 0,
                        collectionId: selectedCollectionId || 'default',
                        img: previewImage || '',
                        createdAt: serverTimestamp()
                    });
                } else {
                    const ref = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
                    await addDoc(ref, {
                        title: name,
                        category: 'GENERAL',
                        icon: '💎',
                        color: 'from-blue-500 to-purple-500',
                        createdAt: serverTimestamp()
                    });
                }
                closeModal();
            } catch (e) {
                console.error("Save Error", e);
            } finally {
                btn.disabled = false;
                btnText.innerText = '確認存檔';
            }
        };

        window.deleteItem = async (e, id, type) => {
            e.stopPropagation();
            if (!confirm('確定要刪除嗎？此動作無法復原。')) return;
            const path = type === 'ITEM' 
                ? ['artifacts', appId, 'users', currentUser.uid, 'items', id]
                : ['artifacts', appId, 'public', 'data', 'categories', id];
            
            try {
                await deleteDoc(doc(db, ...path));
            } catch (e) {
                console.error("Delete Error", e);
            }
        };

        window.handleLogout = () => signOut(auth).then(() => window.location.reload());

        window.openDetail = (id) => {
            selectedCollectionId = id;
            switchTab('DETAIL');
        };

        // --- 核心渲染引擎 ---
        function render() {
            const container = document.getElementById('main-content');
            
            if (activeTab === 'DASHBOARD') {
                container.innerHTML = `
                    <div class="bg-slate-900 rounded-[64px] border border-slate-800 p-16 relative overflow-hidden shadow-2xl">
                        <div class="relative z-10">
                            <h1 class="text-6xl font-black text-white mb-6 italic tracking-tighter uppercase">
                                ${currentUser?.displayName ? `你好, ${currentUser.displayName}` : '私人資產管理面板'}
                            </h1>
                            <p class="text-slate-400 text-xl opacity-80 max-w-2xl">將您的實體收藏轉化為數位資產。系統已同步至雲端核心。</p>
                            <div class="mt-8 flex items-center space-x-3 text-xs font-black text-blue-500 uppercase tracking-widest">
                                <i class="fas fa-circle animate-pulse text-[8px]"></i>
                                <span>身份標識: ${currentUser?.uid}</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                        ${collections.map(col => `
                            <div onclick="openDetail('${col.id}')" class="bg-slate-900/40 rounded-[48px] border border-slate-800 p-10 group hover:border-blue-500/30 cursor-pointer transition-all">
                                <div class="w-16 h-16 rounded-[24px] bg-gradient-to-br ${col.color || 'from-blue-600 to-indigo-600'} flex items-center justify-center text-3xl mb-8 shadow-xl group-hover:scale-110 transition-transform">
                                    ${col.icon || '💎'}
                                </div>
                                <h3 class="font-black text-white text-xl group-hover:text-blue-400 transition-colors uppercase">${col.title}</h3>
                                <p class="text-[10px] font-black text-slate-600 mt-2 uppercase tracking-widest">${col.category}</p>
                            </div>
                        `).join('')}
                        <button onclick="openModal('CATEGORY')" class="bg-slate-900/20 border-2 border-dashed border-slate-800 rounded-[48px] flex flex-col items-center justify-center text-slate-600 hover:border-blue-500/50 transition-all p-12 min-h-[200px] group">
                            <i class="fas fa-plus text-2xl group-hover:scale-125 transition-transform"></i>
                            <span class="mt-4 text-[10px] font-black uppercase tracking-widest">新增分類</span>
                        </button>
                    </div>
                `;
            } else if (activeTab === 'DETAIL') {
                const col = collections.find(c => c.id === selectedCollectionId);
                const filteredItems = items.filter(i => i.collectionId === selectedCollectionId);
                
                container.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-6">
                            <button onclick="switchTab('DASHBOARD')" class="p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-slate-400 hover:text-white transition-all">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <div>
                                <h1 class="text-4xl font-black text-white tracking-tighter uppercase">${col ? col.title : '資產項目'}</h1>
                                <p class="text-xs text-slate-500 font-bold tracking-widest uppercase mt-1">目前庫存: ${filteredItems.length} 件</p>
                            </div>
                        </div>
                        <button onclick="openModal('ITEM')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-lg font-black text-sm hover:bg-blue-500 transition-all flex items-center space-x-3">
                            <i class="fas fa-plus"></i><span>新增收藏項目</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                        ${filteredItems.map(item => `
                            <div class="bg-slate-900/40 border border-slate-800 rounded-[32px] overflow-hidden hover:border-blue-500/30 transition-all group">
                                <div class="h-64 overflow-hidden relative bg-slate-950 flex items-center justify-center">
                                    ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<i class="fas fa-box-open text-slate-800 text-5xl"></i>`}
                                </div>
                                <div class="p-8">
                                    <h4 class="font-black text-white text-lg">${item.name}</h4>
                                    <div class="flex justify-between items-center mt-6">
                                        <p class="text-white font-black text-xl">NT$ ${item.price.toLocaleString()}</p>
                                        <button onclick="deleteItem(event, '${item.id}', 'ITEM')" class="text-slate-700 hover:text-red-500 transition-colors">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (activeTab === 'COLLECTIONS') {
                container.innerHTML = `
                    <div class="flex justify-between items-end">
                        <h1 class="text-5xl font-black text-white tracking-tighter italic uppercase">資產庫檔案列表</h1>
                        <button onclick="openModal('CATEGORY')" class="bg-white text-black px-10 py-5 rounded-3xl font-black flex items-center space-x-3 hover:bg-slate-200 transition-all">
                            <i class="fas fa-plus"></i><span>建立分類</span>
                        </button>
                    </div>
                    <div class="bg-slate-900/40 rounded-[40px] border border-slate-800 overflow-hidden shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800">
                                <tr>
                                    <th class="px-12 py-8 text-center w-24">圖標</th>
                                    <th class="px-12 py-8">分類名稱</th>
                                    <th class="px-12 py-8">類別</th>
                                    <th class="px-12 py-8 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-800/50 text-white">
                                ${collections.map(col => `
                                    <tr class="hover:bg-blue-500/5 transition-colors">
                                        <td class="px-12 py-8 text-center text-2xl">${col.icon || '💎'}</td>
                                        <td class="px-12 py-8 font-black">${col.title}</td>
                                        <td class="px-12 py-8"><span class="bg-slate-800 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">${col.category}</span></td>
                                        <td class="px-12 py-8 text-right">
                                            <button onclick="deleteItem(event, '${col.id}', 'CAT')" class="text-slate-700 hover:text-red-500 transition-colors ml-4">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else if (activeTab === 'ANALYTICS') {
                const totalValue = items.reduce((sum, item) => sum + (item.price || 0), 0);
                container.innerHTML = `
                    <h1 class="text-5xl font-black text-white tracking-tighter italic uppercase">價值分析報告</h1>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-blue-600 rounded-[48px] p-12 text-white shadow-2xl">
                            <p class="text-xs font-black uppercase tracking-widest opacity-80 mb-4">目前總資產價值</p>
                            <h2 class="text-6xl font-black italic">NT$ ${totalValue.toLocaleString()}</h2>
                        </div>
                        <div class="bg-slate-900 rounded-[48px] border border-slate-800 p-12 text-white">
                            <p class="text-xs font-black uppercase tracking-widest text-slate-500 mb-4">收藏總數</p>
                            <h2 class="text-6xl font-black italic">${items.length} <span class="text-xl not-italic">ITEMS</span></h2>
                        </div>
                    </div>
                `;
            }
        }

        // 啟動系統
        window.onload = initAuth;
    </script>
</body>
</html>
